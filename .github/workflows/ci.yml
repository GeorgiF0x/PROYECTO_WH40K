name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint step is temporarily disabled — eslint-config-next hits a
      # circular-reference bug on ESLint 9.39 (upstream issue). Typecheck,
      # format check and tests still catch real regressions.
      # TODO: re-enable once the config is migrated to native flat config.
      # - name: Lint
      #   run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

  # The production build runs on Dokploy (auto-deploy on push). Duplicating it
  # here would require mirroring all Supabase/Mapbox/Turnstile secrets into
  # GitHub, which isn't worth it for a CI-only check. Typecheck above already
  # catches type regressions that would break the real build.
